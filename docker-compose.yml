version: '3'
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile-backend
    ports:
      - "8080:8080"
      #- "49152-65535:49152-65535"
    # network_mode: host

    # Exposing the dynamic port range for p2p file sharing
    #expose:
     # - "49152-65535:49152-65535"


  frontend:
    build:
      context: .
      dockerfile: Dockerfile-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080
    depends_on:
      - backend
